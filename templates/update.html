<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Update this post</h1>

    <form action="{{ url_for('update', post_id=post['id']) }}" method="POST">
        <div>
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" value="{{ post.title }}" required>
        </div>

        <div>
            <label for="author">Author:</label>
            <input type="text" id="author" name="author" value="{{ post.author }}" required>
        </div>

        <div>
            <label for="content">Content:</label>
<!--            textarea code needs to be in one line to avoid added whitespace-->
            <textarea id="content" name="content" rows="5" required>{{ post.content }}</textarea>
        </div>

        <br>
        <button class="btn submit-button" type="submit">Submit Post</button>
    </form>
    </div>
</body>
</html>
